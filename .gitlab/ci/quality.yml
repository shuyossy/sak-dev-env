lint:format:
  stage: quality
  image: $IMAGE_NODE
  needs: ['setup:node']
  script:
    - npm run format:check

lint:eslint:
  stage: quality
  image: $IMAGE_NODE
  needs: ['setup:node']
  script:
    - npm run lint

lint:checkstyle:
  stage: quality
  image: $IMAGE_MAVEN
  needs: ['setup:maven']
  cache:
    - <<: *cache_maven
  # Checkstyle は pom.xml に advisory (soft gate / google_checks) と blocking (hard gate)
  # の 2 つの execution を定義している。`checkstyle:check` を引数なしで呼ぶと plugin 既定
  # の sun_checks で走ってしまうため、@execution-id 構文で両方を明示的に起動する。
  # advisory は severity=warning で情報表示のみ、blocking は severity=error で違反時 fail。
  script:
    - ./mvnw $MAVEN_CLI_OPTS checkstyle:check@checkstyle-advisory checkstyle:check@checkstyle-blocking

lint:pmd:
  stage: quality
  image: $IMAGE_MAVEN
  needs: ['setup:maven']
  cache:
    - <<: *cache_maven
  script:
    - ./mvnw $MAVEN_CLI_OPTS pmd:check

lint:spotbugs:
  stage: quality
  image: $IMAGE_MAVEN
  needs: ['setup:maven']
  cache:
    - <<: *cache_maven
  script:
    - ./mvnw $MAVEN_CLI_OPTS compile spotbugs:check

test:java:
  stage: quality
  image: $IMAGE_MAVEN
  needs: ['setup:maven']
  cache:
    - <<: *cache_maven
  script:
    - ./mvnw $MAVEN_CLI_OPTS test
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/TEST-*.xml
    paths:
      - target/jacoco.exec
    expire_in: 1 week

test:js:
  stage: quality
  image: $IMAGE_NODE
  needs: ['setup:node']
  script:
    - npm run test:coverage
  artifacts:
    when: always
    paths:
      - target/vitest-coverage/
    expire_in: 1 week

coverage:java:
  stage: quality
  image: $IMAGE_MAVEN
  needs: ['test:java']
  cache:
    - <<: *cache_maven
  script:
    - ./mvnw $MAVEN_CLI_OPTS -Pci-mr jacoco:report jacoco:check

secret:gitleaks:
  stage: quality
  image:
    name: $IMAGE_GITLEAKS
    entrypoint: ['']
  script:
    - gitleaks detect --source=. --no-git=false --verbose
