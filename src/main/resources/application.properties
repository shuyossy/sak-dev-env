spring.application.name=sak-sample

# コンテキストパス（PBI #2: コンテキストパスは sampleapp）
server.servlet.context-path=/sampleapp

# H2 インメモリ DB（旅程作成サンプル用）
spring.datasource.url=jdbc:h2:mem:sampleapp;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# 起動時に data.sql を実行（defer-datasource-initialization=true で JPA テーブル作成後に走る）
spring.sql.init.mode=always

# Spring AI（OpenAI 互換）
# 適用先環境では env 変数または application-<profile>.properties で上書きしてください
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:dummy-key}
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://api.openai.com}
spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_MODEL:gpt-4o-mini}

# Actuator + Tracing（traceId / spanId をログ MDC に注入）
management.endpoints.web.exposure.include=health,info
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
