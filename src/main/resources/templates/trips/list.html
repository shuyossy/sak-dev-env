<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>旅程一覧</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" th:href="@{/trips}">sak-sample 旅程アプリ</a>
      </div>
    </nav>
    <main class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3">旅程一覧</h1>
        <button
          type="button"
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#tripCreateModal">
          新規作成
        </button>
      </div>

      <table class="table table-hover">
        <thead>
          <tr>
            <th scope="col">タイトル</th>
            <th scope="col">行き先</th>
            <th scope="col">期間</th>
          </tr>
        </thead>
        <tbody>
          <tr
            th:each="trip : ${trips}"
            th:onclick="|location.href='@{/trips/{id}(id=${trip.id()})}'|"
            style="cursor: pointer">
            <td th:text="${trip.title()}">タイトル</td>
            <td th:text="${trip.destination()}">行き先</td>
            <td
              th:text="${trip.startDate()} + ' 〜 ' + ${trip.endDate()}">
              2026-05-01 〜 2026-05-03
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(trips)}">
            <td colspan="3" class="text-center text-muted">旅程がまだありません</td>
          </tr>
        </tbody>
      </table>

      <!-- 新規作成モーダル -->
      <div class="modal fade" id="tripCreateModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <form id="tripCreateForm" class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">新しい旅程</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="閉じる"></button>
            </div>
            <div class="modal-body">
              <div class="mb-2">
                <label class="form-label">タイトル</label>
                <input class="form-control" name="title" required maxlength="100" />
              </div>
              <div class="mb-2">
                <label class="form-label">行き先</label>
                <input class="form-control" name="destination" required maxlength="100" />
              </div>
              <div class="mb-2">
                <label class="form-label">開始日</label>
                <input type="date" class="form-control" name="startDate" required />
              </div>
              <div class="mb-2">
                <label class="form-label">終了日</label>
                <input type="date" class="form-control" name="endDate" required />
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                キャンセル
              </button>
              <button type="submit" class="btn btn-primary">作成</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/trips-list.js}"></script>
  </body>
</html>
